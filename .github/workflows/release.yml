name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.9.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: git checkout -b release/${{ inputs.version }}

      - name: Bump version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ inputs.version }}
        run: node .github/scripts/update-changelog.js

      - name: Commit and push
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release ${{ inputs.version }}"
          git push origin release/${{ inputs.version }}

      - name: Create PR to main
        id: pr
        run: |
          URL=$(gh pr create \
            --base main \
            --head release/${{ inputs.version }} \
            --title "release: ${{ inputs.version }}" \
            --body "Automated release PR for v${{ inputs.version }}. See [CHANGELOG.md](CHANGELOG.md) for details.")
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: |
          gh pr merge release/${{ inputs.version }} --auto --merge \
            || echo "::warning::Auto-merge unavailable — enable it in repo Settings → Pull Requests, or merge ${{ steps.pr.outputs.url }} manually."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
